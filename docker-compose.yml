version: '3.8'
services:
  sql-server:
    image: mcr.microsoft.com/azure-sql-edge
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "sleep 1"]
      interval: 10s
      retries: 5
    networks:
      - employee-api-network
  api:
    build: .
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=EmployeeDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
    ports:
      - "5151:8080"
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - employee-api-network
networks:
  employee-api-network:
    driver: bridge